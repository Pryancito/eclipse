[package]
name = "eclipse-libc"
version = "0.2.0"
edition = "2021"

[dependencies]
eclipse-syscall = { path = "../../../eclipse-syscall" }

[features]
default = ["std", "allocator", "panic-handler"]
allocator = []
panic-handler = []
std = []
extra_traits = []
use_std = []
align = []
const-extern-fn = []

[lib]
name = "libc"
path = "src/lib.rs"
crate-type = ["rlib"]

[profile.release]
lto = false

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(eclipse_target)'] }
