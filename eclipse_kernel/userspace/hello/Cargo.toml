[package]
name = "hello"
version = "0.2.0"
edition = "2021"

[dependencies]
eclipse-libc = { package = "libc", path = "../../../eclipse-relibc", default-features = false }
eclipse-syscall = { path = "../../../eclipse-syscall" }

[[bin]]
name = "hello"
path = "src/main.rs"

[profile.release]
panic = "abort"
lto = true
opt-level = "z"
codegen-units = 1
