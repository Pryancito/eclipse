[build]
target = "x86_64-unknown-linux-musl"

[unstable]
# eclipse-init usa `std` y el árbol `eclipse_kernel/` fuerza build-std para `core`.
# Para evitar duplicar `core` (E0152), aquí forzamos build-std de **std completo**
# (incluye `core`/`alloc`) usando la misma fuente.
build-std = ["std", "panic_abort"]
build-std-features = ["compiler-builtins-mem"]

[target.x86_64-unknown-linux-musl]
rustflags = [
  "-Zunstable-options",
  "--cfg", "eclipse_target",
  "-C", "link-arg=-Tlinker.ld",
  "-C", "relocation-model=static",
]
