[package]
name = "eclipse-init"
version = "0.1.0"
edition = "2021"

[dependencies]
eclipse-libc = { package = "eclipse-libc", path = "../../../eclipse-relibc", features = ["panic-handler"] }

[[bin]]
name = "eclipse-init"
path = "src/main.rs"

[profile.release]
panic = "abort"
lto = true
opt-level = "z"
codegen-units = 1
