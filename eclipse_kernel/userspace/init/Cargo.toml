[package]
name = "eclipse-init"
version = "0.2.0"
edition = "2021"

[dependencies]
eclipse-relibc = { path = "../../../eclipse-relibc", default-features = false, features = ["std", "use_std", "allocator", "eclipse-syscall"] }
eclipse-syscall = { path = "../../../eclipse-syscall" }
eclipse-program-codes = { path = "../../../eclipse-program-codes", default-features = false }

[[bin]]
name = "eclipse-init"
path = "src/main.rs"

[profile.release]
panic = "abort"
lto = true
opt-level = "z"
codegen-units = 1
