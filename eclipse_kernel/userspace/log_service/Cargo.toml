[package]
name = "log_service"
version = "0.2.0"
edition = "2021"
resolver = "2"

[dependencies]
eclipse-libc = { package = "libc", path = "../../../eclipse-relibc", default-features = false, features = ["allocator", "eclipse-syscall", "use_std"] }
eclipse-syscall = { path = "../../../eclipse-syscall" }

[[bin]]
name = "log_service"
path = "src/main.rs"

[profile.release]
panic = "abort"
lto = true
opt-level = "z"
codegen-units = 1
