[package]
name = "network_service"
version = "0.1.0"
edition = "2021"
resolver = "2"

[dependencies]
std = { package = "eclipse_std", path = "../../../eclipse-apps/eclipse_std" }
eclipse-libc = { package = "eclipse-libc", path = "../../../eclipse-relibc", default-features = false }
eclipse-syscall = { path = "../../../eclipse-syscall" }

[[bin]]
name = "network_service"
path = "src/main.rs"

[profile.release]
panic = "abort"
lto = true
opt-level = "z"
codegen-units = 1
