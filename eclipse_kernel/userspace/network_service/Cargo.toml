[package]
name = "network_service"
version = "0.2.0"
edition = "2021"
resolver = "2"

[dependencies]
std = { package = "eclipse_std", path = "../../../eclipse-apps/eclipse_std" }
eclipse-libc = { package = "libc", path = "../../../eclipse-relibc", default-features = false }
eclipse-syscall = { path = "../../../eclipse-syscall" }
smoltcp = { version = "0.11.0", default-features = false, features = ["alloc", "log", "proto-ipv4", "proto-ipv6", "socket-tcp", "socket-udp", "socket-icmp", "socket-dhcpv4", "socket-dns", "medium-ethernet"] }
log = "0.4"

[[bin]]
name = "network_service"
path = "src/main.rs"

[profile.release]
panic = "abort"
lto = true
opt-level = "z"
codegen-units = 1
