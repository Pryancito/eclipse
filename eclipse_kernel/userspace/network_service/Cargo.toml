[package]
name = "network_service"
version = "0.2.0"
edition = "2021"
resolver = "2"

[dependencies]
eclipse-relibc = { path = "../../../eclipse-relibc", default-features = false, features = ["allocator", "eclipse-syscall", "use_std"] }
eclipse-syscall = { path = "../../../eclipse-syscall" }
smoltcp = { version = "0.13.0", default-features = false, features = ["alloc", "log", "proto-ipv4", "proto-ipv6", "socket-tcp", "socket-udp", "socket-icmp", "socket-dhcpv4", "socket-dns", "medium-ethernet"] }
log = "0.4"

[[bin]]
name = "network_service"
path = "src/main.rs"

[profile.dev]
panic = "abort"
opt-level = "s"

[profile.release]
panic = "abort"
lto = true
opt-level = "z"
codegen-units = 1
