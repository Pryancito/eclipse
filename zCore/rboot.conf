# The config file for rboot.
# Place me at \EFI\Boot\rboot.conf

# The address at which the kernel stack is placed.
# kernel_stack_address=0xFFFFFF8000000000

# The size of the kernel stack, given in number of 4KiB pages. Defaults to 512.
# kernel_stack_size=128

# The virtual address offset from which physical memory is mapped, as described in
# https://os.phil-opp.com/paging-implementation/#map-the-complete-physical-memory
physical_memory_offset=0xFFFF800000000000

# The path of kernel ELF
kernel_path=\EFI\zCore\zcore.elf

# The resolution of graphic output
resolution=1024x768

initramfs=\EFI\zCore\initramfs.img
# LOG=debug/info/error/warn/trace
# Boot processes (format "CMD?ARG?ARG", '?' splits command and args):
#   INIT  = the PID 1 init process. Default /sbin/openrc-init, run ONLY if it
#           exists; if absent the system boots with no PID 1 init.
#   SHELL = the per-terminal shell, spawned on every virtual terminal
#           (tty1..tty6) with fixed PIDs 101..106. Default /bin/busybox?sh.
#           (ROOTPROC is still accepted as a deprecated alias for SHELL.)
# Example: INIT=/sbin/openrc-init:SHELL=/bin/busybox?sh
# El instalador (install-eclipse) sustituye __ECLIPSE_CMDROOTDEV por el
# dispositivo real de la partición ROOT (p.ej. /dev/sda2). En el medio live
# queda sin sustituir y el kernel mantiene el medio de arranque como /.
cmdline=LOG=error:TERM=xterm-256color:console.shell=true:virtcon.disable=true:ROOT=__ECLIPSE_CMDROOTDEV
