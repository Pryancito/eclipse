[workspace]
resolver = "2"
members = [
    "smithay_app",
    "sidewind_core",
    "sidewind_sdk",
    "sidewind_wayland",
    "sidewind_xwayland",
    "demo_client",
    "wayland_handshake",
    "x11_bridge_test",
    "systemd",
    "eclipse_std",
    "sidewind_nvidia",
    "sidewind_opengl",
    "libs/ipc",
    "input_test",
    "gl_demo",
]
exclude = ["libs/ipc_tests"]



[workspace.dependencies]
eclipse_ipc = { path = "libs/ipc" }
sidewind_core = { path = "sidewind_core" }
sidewind_sdk = { path = "sidewind_sdk" }
sidewind_wayland = { path = "sidewind_wayland" }
sidewind_xwayland = { path = "sidewind_xwayland" }

[profile.release]
panic = "abort"
lto = "off"
opt-level = "s"
codegen-units = 1
strip = false
debug = true

[profile.dev]
opt-level = "s"
