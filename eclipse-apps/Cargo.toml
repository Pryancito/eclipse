[workspace]
resolver = "2"
members = [
    "smithay_app",
    "sidewind",
    "sidewind_core",
    "wayland_handshake",
    "x11_bridge_test",
    "eclipse_std",
    "libs/ipc",
]
exclude = ["libs/ipc_tests"]

[workspace.dependencies]
eclipse_ipc = { path = "libs/ipc" }
sidewind = { path = "sidewind" }
sidewind_core = { path = "sidewind_core" }

[profile.release]
panic = "abort"
lto = "off"
opt-level = "s"
codegen-units = 1
strip = false
debug = true

[profile.dev]
opt-level = "s"
panic = "abort"
