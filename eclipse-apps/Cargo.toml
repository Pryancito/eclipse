[workspace]
resolver = "2"
members = [
    "smithay_app",
    "sidewind",
    "sidewind_core",
    "wayland_handshake",
    "x11_bridge_test",
    "eclipse_std",
    "libs/ipc",
]
exclude = ["libs/ipc_tests", "std_test"]

[workspace.dependencies]
eclipse_ipc = { path = "libs/ipc" }
sidewind = { path = "sidewind" }
sidewind_core = { path = "sidewind_core" }

[profile.release]
# IMPORTANTE: Este es el lugar correcto para configurar perfiles en un workspace.
# Las secciones [profile.*] en paquetes miembro (p. ej. smithay_app/Cargo.toml)
# son ignoradas silenciosamente por Cargo; cualquier cambio debe hacerse aquí.
#
# debug=false + strip="symbols" reducen el binario de ~75 MB a ~3.5 MB:
#   - Pasan de cientos de segmentos PT_LOAD ELF a solo 4.
#   - El número de VMAs al arrancar cae de cientos/miles a ~20–25.
#   - Esto evita que mprotect() falle con ENOMEM al configurar el alt-signal-stack
#     del runtime de Rust (stack_overflow.rs), que se manifestaba como:
#       "failed to set up alternative stack guard page: Cannot allocate memory"
panic = "abort"
lto = "off"
opt-level = "s"
codegen-units = 1
debug = false
strip = "symbols"

# Para debuggear smithay_app en Eclipse OS sin afectar al resto de binarios:
# desactivamos el strip y activamos símbolos solo para ese paquete.
[profile.release.package.smithay_app]
strip = "none"
debug = true

[profile.dev]
opt-level = "s"
panic = "abort"

[patch.crates-io]
std = { package = "eclipse_std", path = "eclipse_std" }
# Sustituir libc de crates.io por eclipse-relibc (clave debe ser "libc" para que aplique).
libc = { path = "../eclipse-relibc" }
# Con feature "wayland" (smithay_app): descomentar para intentar build con --features wayland.
# bitflags = { path = "vendor/bitflags-2.11" }
# errno = { path = "vendor/errno-0.3.14" }
# downcast-rs = { path = "vendor/downcast-rs-1.2.1" }
# wayland-sys = { path = "vendor/wayland-sys-0.31.10" }
