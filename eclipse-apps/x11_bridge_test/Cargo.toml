[package]
name = "x11_bridge_test"
version = "0.1.0"
edition = "2021"

[lib]
name = "x11_bridge_test"
path = "src/lib.rs"

[[example]]
name = "x11_bridge_test"
path = "examples/x11_bridge_test.rs"
required-features = ["std"]

[dependencies]
eclipse-libc = { package = "libc", path = "../../eclipse-relibc", default-features = false, features = ["std", "allocator"] }
sidewind = { path = "../sidewind" }
std = { package = "eclipse_std", path = "../eclipse_std", optional = true }

[features]
host-testing = ["eclipse-libc/host-testing", "sidewind/host-testing", "std/host-testing"]
