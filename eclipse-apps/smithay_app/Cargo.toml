# Un solo binario (smithay_app): backend según target.
# - target linux (host): compositor Wayland con Smithay + winit.
# - target no-linux (eclipse): compositor Eclipse (DRM, SideWind, IPC).

[package]
name = "smithay_app"
version = "0.1.0"
edition = "2021"
resolver = "2"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"

[dependencies]
# Dependencias solo para target Eclipse (no linux)
[target.'cfg(not(target_os = "linux"))'.dependencies]
std = { package = "eclipse_std", path = "../eclipse_std" }
eclipse_ipc = { path = "../libs/ipc", features = ["testable", "async"] }
sidewind = { path = "../sidewind" }
eclipse-syscall = { path = "../../eclipse-syscall" }
heapless = "0.8"
embedded-graphics = "0.8.1"
micromath = "2.1.0"

# Dependencias solo para target Linux (host) — ventana software sin EGL/GL
# Usar softbuffer (pixel buffer puro) en lugar de smithay+EGL para evitar
# el agotamiento de VMAs (max_map_count) que causa el fallo del sigaltstack.
[target.'cfg(target_os = "linux")'.dependencies]
winit = { version = "0.30", features = ["rwh_06"] }
softbuffer = "0.4"

[features]
default = []
host-testing = ["std/host-testing"]
trace-frames = []

[dev-dependencies]
std = { package = "eclipse_std", path = "../eclipse_std", features = ["host-testing"] }

[[bin]]
name = "smithay_app"
path = "src/main.rs"
