[package]
name = "smithay_app"
version = "0.1.0"
edition = "2021"
resolver = "2"

[dependencies]
eclipse_ipc = { path = "../libs/ipc", features = ["testable", "async"] }
sidewind = { path = "../sidewind" }
eclipse-syscall = { path = "../../eclipse-syscall" }
std = { package = "eclipse_std", path = "../eclipse_std" }
heapless = "0.8"
embedded-graphics = "0.8.1"
micromath = "2.1.0"

[features]
default = []
host-testing = ["std/host-testing"]
# Log frames that take >100 ticks and heartbeat cada 600 frames (diagnóstico de trompicones)
trace-frames = []

# Para `cargo test`: une features y activa host-testing en std, evitando conflicto con libstd.
[dev-dependencies]
std = { package = "eclipse_std", path = "../eclipse_std", features = ["host-testing"] }

[[bin]]
name = "smithay_app"
path = "src/main.rs"
