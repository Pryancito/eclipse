# Un solo binario (smithay_app): backend según target.
# - target linux (host): compositor Wayland con Smithay + winit.
# - target no-linux (eclipse): compositor Eclipse (DRM, SideWind, IPC).
#
# IMPORTANTE: Los ajustes de perfil (debug, strip, lto, opt-level, panic, …)
# deben definirse en el Cargo.toml de la RAÍZ del workspace
# (eclipse-apps/Cargo.toml), no aquí.  Cargo ignora silenciosamente las
# secciones [profile.*] definidas en paquetes miembro de un workspace.
# Editar este archivo para cambiar perfiles NO tendrá efecto.

[package]
name = "smithay_app"
version = "0.2.0"
edition = "2021"
autobins = false

[lib]
name = "smithay_app"
path = "src/lib.rs"

[dependencies]
heapless = "0.8"
embedded-graphics = "0.8.1"
micromath = "2.1.0"
bitflags = { version = "2.4", default-features = false }
tiny-skia = { version = "0.11", default-features = false, features = ["no-std-float"] }
eclipse-syscall = { workspace = true }
eclipse_ipc = { workspace = true }
sidewind = { path = "../sidewind" }
wayland-proto = { path = "../libs/wayland-proto" }
eclipse-relibc = { workspace = true, features = ["allocator", "eclipse-syscall", "use_std"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"], optional = true }
smithay = { version = "0.7", default-features = false, features = ["backend_winit", "renderer_gl", "wayland_frontend", "desktop"], optional = true }

[features]
default = []
trace-frames = []
# Habilitar el backend Wayland completo (Smithay + winit) en target Linux.
# Sin esta feature, el binario en Linux imprime un mensaje de error y sale.
# Uso: cargo build --features wayland   (o en el build.sh para release de producción).
wayland = ["dep:smithay", "dep:tracing-subscriber"]

