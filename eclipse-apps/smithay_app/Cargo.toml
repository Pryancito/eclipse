[package]
name = "smithay_app"
version = "0.1.0"
edition = "2021"
resolver = "2"

[lib]
name = "smithay_app"
path = "src/lib.rs"

[dependencies]
eclipse-libc = { package = "eclipse-libc-internal", path = "../../eclipse_kernel/userspace/libc" }
eclipse_ipc = { path = "../libs/ipc", features = ["testable"] }
sidewind_core = { path = "../sidewind_core" }
sidewind_wayland = { path = "../sidewind_wayland" }
sidewind_xwayland = { package = "sidewind-xwayland", path = "../sidewind_xwayland" }
sidewind_sdk = { path = "../sidewind_sdk" }
eclipse-syscall = { path = "../../eclipse-syscall" }
heapless = "0.8"
embedded-graphics = "0.8.1"
micromath = "2.1.0"

[[bin]]
name = "smithay_app"
path = "src/main.rs"

