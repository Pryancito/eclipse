# Un solo binario (smithay_app): backend según target.
# - target linux (host): compositor Wayland con Smithay + winit.
# - target no-linux (eclipse): compositor Eclipse (DRM, SideWind, IPC).
#
# IMPORTANTE: Los ajustes de perfil (debug, strip, lto, opt-level, panic, …)
# deben definirse en el Cargo.toml de la RAÍZ del workspace
# (eclipse-apps/Cargo.toml), no aquí.  Cargo ignora silenciosamente las
# secciones [profile.*] definidas en paquetes miembro de un workspace.
# Editar este archivo para cambiar perfiles NO tendrá efecto.

[package]
name = "smithay_app"
version = "0.2.0"
edition = "2021"
autobins = false

[lib]
name = "smithay_app"
path = "src/lib.rs"

[dependencies]
heapless = "0.8"
embedded-graphics = "0.8.1"
micromath = "2.1.0"
bitflags = "2.4"
eclipse-syscall = { path = "../../eclipse-syscall" }
# Dependencias solo para target Eclipse (vendor eclipse).
# wayland-server/wayland-protocols: detrás de feature "wayland"; sin ella el build Eclipse no los incluye
# (evita errno/wayland_sys/downcast_rs que esperan std del sysroot; ver docs/WAYLAND_RS_ECLIPSE.md).
[target.'cfg(target_vendor = "eclipse")'.dependencies]
eclipse_ipc = { path = "../libs/ipc", features = ["testable", "async"] }
sidewind = { path = "../sidewind" }
eclipse-syscall = { path = "../../eclipse-syscall" }
# Usamos eclipse_std en modo compatibilidad con std para que NO registre su
# propio panic_handler/alloc_error_handler; dejamos que eclipse-relibc lo haga.
eclipse_std = { package = "eclipse_std", path = "../eclipse_std" }
# Misma versión que el [patch.crates-io] del workspace → eclipse-relibc.
libc = { version = "0.2", default-features = false }

# Dependencias solo para target Linux (host) — compositor Wayland con Smithay
[target.'cfg(not(target_vendor = "eclipse"))'.dependencies]
sidewind = { path = "../sidewind" }
eclipse_ipc = { path = "../libs/ipc", features = ["testable", "async"] }
libc = "0.2"
tracing-subscriber = { version = "0.3", features = ["env-filter"], optional = true }
smithay = { version = "0.7", default-features = false, features = ["backend_winit", "renderer_gl", "wayland_frontend", "desktop"], optional = true }

[features]
default = []
trace-frames = []
# Habilitar el backend Wayland completo (Smithay + winit) en target Linux.
# Sin esta feature, el binario en Linux imprime un mensaje de error y sale.
# Uso: cargo build --features wayland   (o en el build.sh para release de producción).
wayland = ["dep:smithay", "dep:tracing-subscriber"]

