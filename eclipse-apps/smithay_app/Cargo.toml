# Un solo binario (smithay_app): backend según target.
# - target linux (host): compositor Wayland con Smithay + winit.
# - target no-linux (eclipse): compositor Eclipse (DRM, SideWind, IPC).

[package]
name = "smithay_app"
version = "0.1.0"
edition = "2021"
resolver = "2"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"

[dependencies]
heapless = "0.8"
embedded-graphics = "0.8.1"
micromath = "2.1.0"
# Dependencias solo para target Eclipse (no linux).
# No usamos la crate smithay ni wayland-server aquí: requieren std.
# El compositor Eclipse usa patrones portados (backend, compositor, damage, etc.).
[target.'cfg(not(target_os = "linux"))'.dependencies]
std = { package = "eclipse_std", path = "../eclipse_std" }
eclipse-libc = { package = "eclipse-libc", path = "../../eclipse-relibc", default-features = false, features = ["std", "allocator"] }
eclipse_ipc = { path = "../libs/ipc", features = ["testable", "async"] }
sidewind = { path = "../sidewind" }
eclipse-syscall = { path = "../../eclipse-syscall" }

# Dependencias solo para target Linux (host) — compositor Wayland con Smithay
[target.'cfg(target_os = "linux")'.dependencies]
smithay = { version = "0.7", default-features = false, features = ["backend_winit", "renderer_gl", "wayland_frontend", "desktop"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
eclipse-libc = { package = "eclipse-libc", path = "../../eclipse-relibc", default-features = false, features = ["std", "allocator"] }
sidewind = { path = "../sidewind" }
eclipse_ipc = { path = "../libs/ipc", features = ["testable", "async"] }

[features]
default = []
trace-frames = []

[[bin]]
name = "smithay_app"
path = "src/main.rs"
