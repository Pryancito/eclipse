[package]
name = "eclipse_ipc"
version = "0.1.0"
edition = "2021"
authors = ["Eclipse OS Team"]
description = "Biblioteca IPC tipada no_std para Eclipse OS"

[features]
# Expone parse_fast/parse_slow para tests de integración (no usar en producción).
testable = []
# Habilita recv_async(), RecvFuture y block_on para uso con async/await o ejecutores.
async = []
host-testing = ["std/host-testing"]

[target.'cfg(not(target_os = "linux"))'.dependencies]
eclipse-libc = { package = "eclipse-libc", path = "../../../eclipse-relibc", default-features = false }
std = { package = "eclipse_std", path = "../../eclipse_std" }

[dependencies]
sidewind_core = { path = "../../sidewind_core" }
eclipse-syscall = { path = "../../../eclipse-syscall" }

# Al ejecutar `cargo test`, Cargo une features: así eclipse-libc recibe host-testing,
# no registra su global_allocator (mmap Eclipse) y se usa el allocator del sistema.
[dev-dependencies]
eclipse-libc = { package = "eclipse-libc", path = "../../../eclipse-relibc", default-features = false, features = ["host-testing"] }

# Binario test_runner movido a example para evitar conflicto std vs no_std.
# Ejecutar: cargo run -p eclipse_ipc --example test_runner --features testable,host-testing
[[example]]
name = "test_runner"
path = "examples/test_runner.rs"
required-features = ["testable", "host-testing"]

[profile.release]
panic = "abort"
lto = true
opt-level = "z"
codegen-units = 1

[profile.dev]
opt-level = "s"
