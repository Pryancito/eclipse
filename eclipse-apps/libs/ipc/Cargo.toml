[package]
name = "eclipse_ipc"
version = "0.1.0"
edition = "2021"
authors = ["Eclipse OS Team"]
description = "Biblioteca IPC tipada no_std para Eclipse OS"

[features]
# Expone parse_fast/parse_slow para tests de integración (no usar en producción).
testable = []
# Habilita recv_async(), RecvFuture y block_on para uso con async/await o ejecutores.
async = []

[dependencies]
eclipse-libc = { package = "eclipse-libc", path = "../../../eclipse-relibc", default-features = false }
sidewind_core = { path = "../../sidewind_core" }

[profile.release]
panic = "abort"
lto = true
opt-level = "z"
codegen-units = 1

[profile.dev]
opt-level = "s"
