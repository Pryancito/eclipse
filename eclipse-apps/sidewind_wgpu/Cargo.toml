[package]
name = "sidewind-wgpu"
version = "0.1.0"
edition = "2021"
description = "wgpu-inspired GPU abstraction for Eclipse OS (VirtIO + NVIDIA backends, no_std)"

[dependencies]
sidewind_core = { path = "../sidewind_core" }
sidewind-nvidia = { path = "../sidewind_nvidia" }
eclipse-libc = { package = "eclipse-libc-internal", path = "../../eclipse_kernel/userspace/libc" }
heapless = "0.8"

[features]
default = []
# Enable the NVIDIA backend (requires BAR0 MMIO access)
nvidia = []
# Enable the VirtIO/virgl backend (default when running under QEMU/KVM)
virtio = []
