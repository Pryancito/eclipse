[package]
name = "terminal"
version = "0.1.0"
edition = "2021"

[dependencies]
os-terminal = { path = "../libs/os-terminal" }
bitflags = "2.4"
# No-std heapless structures for event handling
heapless = "0.8"
# Use wayland-proto from the local workspace
wayland-proto = { path = "../libs/wayland-proto" }
# SideWind: crate `eclipse-apps/sidewind` (reexporta tipos IPC y `sidewind_core` internamente).
sidewind = { path = "../sidewind" }
eclipse_ipc = { path = "../libs/ipc" }
# Standard library bridge for Eclipse
std = { package = "eclipse_std", path = "../eclipse_std" }
eclipse-syscall = { path = "../../eclipse-syscall" }
libc = { path = "../../eclipse-relibc" }

[features]
default = []
