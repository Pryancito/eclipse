[unstable]
# Habilita el uso de archivos .json como especificación de target (requerido en nightly reciente)
json-target-spec = true 
# NOTA: build-std se define en la línea de comandos para evitar conflictos con el target Linux
# build-std = ["core", "alloc"]
# build-std-features = ["compiler-builtins-mem"]

[build]
target = "x86_64-unknown-linux-musl"

[target.x86_64-unknown-linux-musl]
rustflags = [
    "-C", "panic=abort",
]